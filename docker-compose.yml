# One-command startup:  docker compose up --build
# Or run:  .\start.ps1   (Windows)   |   ./start.sh   (Mac/Linux)

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: healthcare
      POSTGRES_PASSWORD: healthcare
      POSTGRES_DB: healthcare
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthcare"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql+asyncpg://healthcare:healthcare@postgres:5432/healthcare
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret-change-in-production-64chars-minimum!!
      APP_ENV: development
      DEV_OTP: ${DEV_OTP:-false}
      BYPASS_OTP: ${BYPASS_OTP:-false}
      BYPASS_OTP_CODE: ${BYPASS_OTP_CODE:-123456}
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      CLINIC_TIMEZONE: ${CLINIC_TIMEZONE:-Asia/Kolkata}
      GUEST_SESSION_PERSIST: ${GUEST_SESSION_PERSIST:-true}
      SQL_ECHO: ${SQL_ECHO:-false}
      S3_ENDPOINT: http://minio:9000
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@mediai.com}
      WATCHFILES_FORCE_POLLING: "true"
      VIDEO_BYPASS_TIME_WINDOW: ${VIDEO_BYPASS_TIME_WINDOW:-true}
      LIVEKIT_URL: ${LIVEKIT_URL:-}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
      TRANSCRIPT_ENABLED: ${TRANSCRIPT_ENABLED:-true}
      TRANSCRIPT_STT_PROVIDER: ${TRANSCRIPT_STT_PROVIDER:-groq}
      TRANSCRIPT_CHUNK_MS: ${TRANSCRIPT_CHUNK_MS:-6000}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      DEEPGRAM_MODEL: ${DEEPGRAM_MODEL:-nova-3-medical}
      DEEPGRAM_LANGUAGE: ${DEEPGRAM_LANGUAGE:-en}
      DEEPGRAM_SMART_FORMAT: ${DEEPGRAM_SMART_FORMAT:-true}
      DEEPGRAM_INTERIM_RESULTS: ${DEEPGRAM_INTERIM_RESULTS:-true}
      DEEPGRAM_LOG_REQUESTS: ${DEEPGRAM_LOG_REQUESTS:-false}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: ["python", "entrypoint.py"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_TARGET: http://api:8000
      VITE_GUEST_SESSION_PERSIST: ${GUEST_SESSION_PERSIST:-true}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  miniodata:
